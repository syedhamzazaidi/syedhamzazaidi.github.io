<template id="tpl-blog">
  <h2>My Summer at Salesforce</h2>
  <div class="blog-date">July 29, 2021</div>
  <div class="blog-content">
    <p>Aloha!</p>
    <p>Most of you probably already know me but in case this goes viral let me quickly introduce myself: My name is Hamza and I'm currently studying Electronics & Instrumentation Engineering at BITS Pilani. Last year, I accepted a summer internship at Salesforce. I'll be very honest, before I joined I had little to no experience working in a corporate. So, when I was offered this opportunity I started searching online trying to get a glimpse of what it is like and coming up short. So as I wrap up my internship after 8 short weeks, I've decided to pen down my experience here in the hopes that it will help provide some insight to that excited incoming intern curious to know what to expect from their first big internship. Another, more personal, reason is I wanted to have a blog post capturing the memories I have made this summer to come back to years down the road as I reminisce about the place where my career began. I've split up my experience into 4 major sections: Onboarding, Social Events, VTO, Hackathon. I've left out my project — mainly because I'm not sure if I'm allowed to disclose it, but it was a rewarding experience where I finally got to apply some of the things I've learned over the years to a real life use-case.</p>

    <h3>Onboarding</h3>
    <p>Salesforce #futureforce has a unique onboarding experience. We got our offers in the second half of September but our internship was to start in June. This meant we had a lot of time between receiving our offers and the actual joining date. Throughout this period, the onboarding team kept reaching out frequently and setting up small meets to give us updates and clarify any doubts. Not only did these meets act as a way to curb the anxiety about the timeline and status of our internships, they also acted as icebreakers where we got to know each other months before we even joined. The team provided a really smooth experience at each stage from signing the legal documents to shipping and receiving our hardware (we got MacBook Pros).</p>
    <p>Skipping forward to a week before the actual joining date, the team hosted a session to let us know what all to expect during our first week, which is spent entirely on onboarding new interns. I remember joking to a friend that they have an "onboarding session for the actual onboarding session" — that's just how thorough the team is. During the first week, they got us up to speed on the workings of the company, the tools used (Slack, Quip, GSuite, Org62, Trailhead), while also getting us access to the codebases we were going to be working on. We also had our first connects with our mentors and managers where we were briefed about our projects. As far as I know, all of us got really interesting projects from implementing IR models, working on bots, creating dashboards on the Salesforce platform, to implementing full stack solutions to niche developer problems.</p>

    <h3>Social Events</h3>
    <p>I'll go over this briefly since this was a different experience for everyone. For us, the team set up two activities: an icebreaker chit-chat session on Gatheround and a virtual escape room where we were split into teams of 4 and had to race other teams in escaping from the room by solving puzzles. These activities provided us with the initial push to start interacting with each other and soon we started setting up weekly game nights and virtual movie parties on our own.</p>
    <p>We also had a fun Global Coffee Chat program where interns could put up their profiles on a global directory and reach out to others to setup 1-on-1 virtual coffee chats. During the summer, I had around 10 such chats and met a lot of interesting people from around the world, connecting on various things like music, chess, gaming, and even Indian food recipes!</p>

    <h3>VTO</h3>
    <p>Salesforce has an amazing 1-1-1 model which dedicates 1% of the company's equity, 1% of its product, and 1% of employees' time back to the community. We could take Volunteer Time Off (VTO) which is paid time off to volunteer for causes important to us. I have logged 6 VTO hours this summer contributing to research through the Penguin Watch and NASA Globe Cloud Gaze projects on Zooniverse but definitely, the most impactful thing I've done is help students from underserved communities make their resumes. These students come from struggling backgrounds and have spent a year in a residential program hosted by Navgurukul where they learned programming and soft skills. They are going to be applying to jobs in the coming months and we helped them make their resumes and shared our experiences with the hiring process. Hearing about some of the things they have gone through in life and seeing how determined they are to make it was a really humbling experience.</p>

    <h3>Hackathon</h3>
    <p>Some of the best advice I've received during my college years is "Say Yes". If you've seen Yes Man starring Jim Carrey, you know what I'm talking about. If you haven't, then I highly encourage you to watch it. So when a friend asked me if I wanted to take part in the InTurn Innovate Hackathon, I said yes without a second thought. We partnered with two more interns and a mentor to form our team LiteForce. We then spent a lot of time brainstorming ideas and then implementing them within a short deadline. This forced us to skip the small talk and go straight to trusting each other. I'd say this is probably one of the best ways of meeting and getting to know new people. We managed to win which put us in the spotlight with managers and directors reaching out to us to learn more about the project and congratulating us on our win!</p>

    <p>All in all, it was a really amazing summer. I'm thankful to everyone at Salesforce for this wonderful experience. I'm also thankful to my seniors who answered all of my questions and doubts before I even accepted the offer. Now it is my turn to carry on that goodwill. If you have any questions or just want to connect, feel free to reach out — my DMs are always open!</p>
  </div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ─── Config ───
const SPHERE_RADIUS = 9;
const PARTICLE_COUNT = window.innerWidth < 600 ? 800 : 1500;
const ROTATION_SPEED = 0.0004;
const CARD_SIZE = 2.2;

// ─── Card definitions ───
const CARDS = [
  { id:'about',     title:'About Me',          emoji:'👤',  color:'#818cf8', action:{type:'modal'} },
  { id:'blog',      title:'Salesforce Blog',   emoji:'✍️',  color:'#fbbf24', action:{type:'modal'} },
  { id:'vietnam',   title:'Vietnam Trip',      emoji:'🇻🇳', color:'#34d399', action:{type:'link', url:'/vietnam'} },
  { id:'resume',    title:'Resume',            emoji:'📄',  color:'#a78bfa', action:{type:'link', url:'/assets/pdf/resume.pdf', newTab:true} },
  { id:'github',    title:'GitHub',            emoji:'',    color:'#e2e8f0', action:{type:'link', url:'https://github.com/syedhamzazaidi', newTab:true}, icon:'gh' },
  { id:'linkedin',  title:'LinkedIn',          emoji:'',    color:'#38bdf8', action:{type:'link', url:'https://linkedin.com/in/syed-hamza-zaidi', newTab:true}, icon:'li' },
  { id:'x',         title:'X (Twitter)',       emoji:'',    color:'#e2e8f0', action:{type:'link', url:'https://x.com/athamxa', newTab:true}, icon:'x' },
  { id:'instagram', title:'Instagram',         emoji:'',    color:'#f472b6', action:{type:'link', url:'https://instagram.com/hamxa.xaidi', newTab:true}, icon:'ig' },
];

// ─── Scene setup ───
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.1, 1000);
camera.position.set(-10, 1.5, 10);

const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
document.getElementById('canvas-container').appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.05;
controls.enablePan = false;
controls.minDistance = 5;
controls.maxDistance = 25;

scene.add(new THREE.AmbientLight(0xffffff, 0.5));
const ptLight = new THREE.PointLight(0xffffff, 1);
ptLight.position.set(10, 10, 10);
scene.add(ptLight);

// ─── Particle sphere (InstancedMesh for perf) ───
const group = new THREE.Group();
scene.add(group);

const particleGeo = new THREE.SphereGeometry(1, 6, 4);
const particleMat = new THREE.MeshBasicMaterial({ color:0xffffff });
const particles = new THREE.InstancedMesh(particleGeo, particleMat, PARTICLE_COUNT);

const dummy = new THREE.Object3D();
const color = new THREE.Color();

for (let i = 0; i < PARTICLE_COUNT; i++) {
  const phi = Math.acos(-1 + (2*i)/PARTICLE_COUNT);
  const theta = Math.sqrt(PARTICLE_COUNT * Math.PI) * phi;
  const r = SPHERE_RADIUS + (Math.random()-.5)*4;

  dummy.position.set(
    r * Math.cos(theta) * Math.sin(phi),
    r * Math.cos(phi),
    r * Math.sin(theta) * Math.sin(phi)
  );
  const s = Math.random() * 0.005 + 0.005;
  dummy.scale.setScalar(s);
  dummy.updateMatrix();
  particles.setMatrixAt(i, dummy.matrix);

  color.setHSL(Math.random()*0.1 + 0.05, 0.8, 0.6 + Math.random()*0.3);
  particles.setColorAt(i, color);
}
particles.instanceMatrix.needsUpdate = true;
particles.instanceColor.needsUpdate = true;
group.add(particles);

// ─── Generate card textures ───
function generateCardTexture(card) {
  const size = 512;
  const canvas = document.createElement('canvas');
  canvas.width = size;
  canvas.height = size;
  const ctx = canvas.getContext('2d');

  // Background
  const r = 32;
  ctx.beginPath();
  ctx.roundRect(8, 8, size-16, size-16, r);
  ctx.fillStyle = 'rgba(12, 12, 20, 0.88)';
  ctx.fill();

  // Border
  ctx.beginPath();
  ctx.roundRect(8, 8, size-16, size-16, r);
  ctx.strokeStyle = card.color + '55';
  ctx.lineWidth = 3;
  ctx.stroke();

  // Top accent line
  ctx.beginPath();
  ctx.moveTo(size * 0.2, 12);
  ctx.lineTo(size * 0.8, 12);
  ctx.strokeStyle = card.color;
  ctx.lineWidth = 4;
  ctx.lineCap = 'round';
  ctx.stroke();

  // Emoji or icon text
  const symbol = card.emoji || getIconSymbol(card.icon);
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  if (card.emoji) {
    ctx.font = '120px serif';
    ctx.fillText(symbol, size/2, size * 0.38);
  } else {
    ctx.font = '600 64px Inter, sans-serif';
    ctx.fillStyle = card.color;
    ctx.fillText(symbol, size/2, size * 0.38);
  }

  // Title
  ctx.font = '500 36px Inter, sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,0.9)';
  ctx.fillText(card.title, size/2, size * 0.68);

  // Subtle hint
  ctx.font = '300 22px Inter, sans-serif';
  ctx.fillStyle = 'rgba(255,255,255,0.25)';
  ctx.fillText(card.action.type === 'modal' ? 'click to open' : 'click to visit', size/2, size * 0.82);

  return new THREE.CanvasTexture(canvas);
}

function getIconSymbol(icon) {
  const map = { gh:'GitHub', li:'LinkedIn', x:'X', ig:'Insta' };
  return map[icon] || '';
}

// ─── Create card meshes ───
const cardMeshes = [];

CARDS.forEach((card, i) => {
  const tex = generateCardTexture(card);
  const geo = new THREE.PlaneGeometry(CARD_SIZE, CARD_SIZE);
  const mat = new THREE.MeshBasicMaterial({
    map: tex,
    transparent: true,
    side: THREE.DoubleSide,
    depthWrite: false,
  });
  const mesh = new THREE.Mesh(geo, mat);

  const angle = (i / CARDS.length) * Math.PI * 2;
  // Stagger vertically slightly for visual interest
  const yOffset = (i % 2 === 0 ? 0.6 : -0.6);
  mesh.position.set(
    SPHERE_RADIUS * Math.cos(angle),
    yOffset,
    SPHERE_RADIUS * Math.sin(angle)
  );

  mesh.userData = { card, baseScale: 1 };
  group.add(mesh);
  cardMeshes.push(mesh);
});

// ─── Raycaster interaction ───
const raycaster = new THREE.Raycaster();
const pointer = new THREE.Vector2();
let pointerDown = new THREE.Vector2();
let hoveredCard = null;
let isModalOpen = false;

renderer.domElement.addEventListener('pointermove', (e) => {
  pointer.x = (e.clientX / window.innerWidth) * 2 - 1;
  pointer.y = -(e.clientY / window.innerHeight) * 2 + 1;
});

renderer.domElement.addEventListener('pointerdown', (e) => {
  pointerDown.set(e.clientX, e.clientY);
});

renderer.domElement.addEventListener('pointerup', (e) => {
  if (isModalOpen) return;
  const dx = e.clientX - pointerDown.x;
  const dy = e.clientY - pointerDown.y;
  if (Math.sqrt(dx*dx + dy*dy) > 6) return; // was a drag

  raycaster.setFromCamera(pointer, camera);
  const hits = raycaster.intersectObjects(cardMeshes);
  if (hits.length > 0) {
    const { card } = hits[0].object.userData;
    if (card.action.type === 'modal') {
      openModal(card.id);
    } else if (card.action.type === 'link') {
      if (card.action.newTab) {
        window.open(card.action.url, '_blank');
      } else {
        window.location.href = card.action.url;
      }
    }
  }
});

// ─── Modal system ───
const backdrop = document.getElementById('modal-backdrop');
const panel = document.getElementById('modal-panel');
const modalContent = document.getElementById('modal-content');
const closeBtn = document.getElementById('modal-close');

function openModal(id) {
  const tpl = document.getElementById('tpl-' + id);
  if (!tpl) return;
  modalContent.innerHTML = tpl.innerHTML;
  backdrop.classList.add('active');
  panel.classList.add('active');
  isModalOpen = true;
}

function closeModal() {
  backdrop.classList.remove('active');
  panel.classList.remove('active');
  isModalOpen = false;
}

closeBtn.addEventListener('click', closeModal);
backdrop.addEventListener('click', closeModal);
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });

// ─── Animation loop ───
function animate() {
  requestAnimationFrame(animate);

  // Rotate sphere
  group.rotation.y += isModalOpen ? ROTATION_SPEED * 0.2 : ROTATION_SPEED;

  // Billboard cards (face camera)
  cardMeshes.forEach(mesh => {
    // Get world position of mesh
    const worldPos = new THREE.Vector3();
    mesh.getWorldPosition(worldPos);
    // Look at camera from world position
    const lookMatrix = new THREE.Matrix4();
    lookMatrix.lookAt(worldPos, camera.position, camera.up);
    const quat = new THREE.Quaternion();
    quat.setFromRotationMatrix(lookMatrix);
    // Convert to local space (undo group rotation)
    const groupQuatInverse = new THREE.Quaternion();
    group.getWorldQuaternion(groupQuatInverse);
    groupQuatInverse.invert();
    quat.premultiply(groupQuatInverse);
    mesh.quaternion.copy(quat);
  });

  // Hover detection
  if (!isModalOpen) {
    raycaster.setFromCamera(pointer, camera);
    const hits = raycaster.intersectObjects(cardMeshes);
    const hit = hits.length > 0 ? hits[0].object : null;

    if (hoveredCard && hoveredCard !== hit) {
      hoveredCard.scale.setScalar(hoveredCard.userData.baseScale);
      hoveredCard.material.opacity = 1;
    }

    if (hit) {
      hit.scale.setScalar(1.12);
      renderer.domElement.style.cursor = 'pointer';
      hoveredCard = hit;
    } else {
      renderer.domElement.style.cursor = 'default';
      hoveredCard = null;
    }
  }

  controls.update();
  renderer.render(scene, camera);
}

// ─── Init ───
document.getElementById('loading').classList.add('hidden');
setTimeout(() => document.getElementById('hint')?.classList.add('hidden'), 4000);
animate();

// ─── Resize ───
window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
